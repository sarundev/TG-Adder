name: Build Windows Executable

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn requests customtkinter pyTelegramBotAPI telethon opentele rich questionary pyinstaller python-multipart

    - name: Build with PyInstaller
      run: |
        pyinstaller main_gui.py --name TelegramSuiteGUI --onefile --hidden-import=rich --hidden-import=questionary --hidden-import=telethon --hidden-import=python-multipart --hidden-import=multipart --hidden-import=uvicorn.logging --hidden-import=uvicorn.loops --hidden-import=uvicorn.loops.auto --hidden-import=uvicorn.protocols --hidden-import=uvicorn.protocols.http --hidden-import=uvicorn.protocols.http.auto --hidden-import=uvicorn.protocols.websockets --hidden-import=uvicorn.protocols.websockets.auto --hidden-import=uvicorn.lifespan --hidden-import=uvicorn.lifespan.on --hidden-import=uvicorn.lifespan.off

    - name: Zip Executable
      run: |
        Compress-Archive -Path dist/TelegramSuiteGUI.exe -DestinationPath downloads/TelegramSuite_Windows.zip -Force

    - name: Commit and Push
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add downloads/TelegramSuite_Windows.zip
        git commit -m "Auto-build Windows executable [skip ci]" || echo "No changes to commit"
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
