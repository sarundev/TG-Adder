name: Build Windows Executable

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn requests customtkinter pyTelegramBotAPI telethon opentele rich questionary pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller main_gui.py --name TelegramSuiteGUI --onefile --windowed --hidden-import=rich --hidden-import=questionary --hidden-import=telethon

    - name: Zip Executable
      run: |
        Compress-Archive -Path dist/TelegramSuiteGUI.exe -DestinationPath TelegramSuite_Windows.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TelegramSuite_Windows
        path: TelegramSuite_Windows.zip
