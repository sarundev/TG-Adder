name: Build Windows Executables

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Adjust this to your preferred Python version

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executables with PyInstaller
        run: |
          pyinstaller TELE168.spec
          # If you also need the other ones, uncomment the following lines:
          # pyinstaller TelegramSuite.spec
          # pyinstaller scrape_and_add.spec
          # pyinstaller telegram_login.spec

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: TELE168-Windows-GUI-EXE
          path: dist/
